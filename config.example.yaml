# Copy to config.yaml and customize.
host: "127.0.0.1"
port: 7860
log_level: "info"

launcher:
  auto_start_comfyui: true
  comfyui_headless: true
  hide_console: true
  comfyui_path: auto
  comfyui_url: "http://127.0.0.1:8188"
  startup_timeout_seconds: 180
  wait_for_comfyui: true
  block_on_comfyui_timeout: false
  auto_download_models: false
  react_ui_enabled: true
  node_api_port: 3000
  open_browser: true

history:
  enabled: true
  dir: "./data/logs/generation_history"
  retention_days: 30
  auto_purge_on_startup: true

web:
  cors_enabled: true
  cors_origins:
    - "http://127.0.0.1:7860"
    - "http://localhost:7860"
    - "http://127.0.0.1:5173"
    - "http://localhost:5173"
    # Add your Cloudflare Pages URL after deploy:
    # - "https://monster-ai.pages.dev"
  allow_credentials: true

ecosystem:
  enabled: true
  data_dir: "./data/ecosystem"
  network_install_enabled: true
  require_consent: true
  default_bundle: full
  allow_r18_bundle: true
  allow_model_downloads: true

learning:
  enabled: true
  data_dir: "./data/learning"
  feedback_enabled: true
  preference_learning: true
  knowledge_extraction: true
  reflect_enabled: true
  reflect_max_retries: 2
  min_quality_score: 0.70
  inject_context_always: true
  regenerate_on_negative_feedback: true
  auto_tune_quality: true
  evolution_log_enabled: true
  web_learning_enabled: true
  web_auto_search: true
  web_search_langs:
    - zh
    - en
  web_max_results: 3
  web_fetch_timeout_seconds: 15
  web_cache_hours: 24
  image_learning_enabled: true
  image_auto_apply_learned_tags: true
  roleplay_web_enabled: true
  roleplay_web_auto_search: true
  curriculum_enabled: true
  curriculum_duration_hours: 36
  curriculum_extended_hours: 72
  curriculum_auto_start: false

repair:
  interval_seconds: 30
  max_retries: 2
  generation_max_retries: 2
  mode: full_auto
  code_repair_enabled: true
  auto_git_commit: true
  run_tests_after_fix: true
  max_auto_repairs_per_hour: 3
  watchdog:
    enabled: true
    check_ollama: true
    check_comfyui: true
    restart_comfyui: true
  orchestrator:
    enabled: true
    interval_seconds: 60
    check_discord: true
    check_monsterlock: true
    check_ollama: true
    check_api: true
    auto_recover_monsterlock: true

persona:
  enabled: true
  default_mode: grok
  allow_user_override: true
  response_locale: zh-TW
  grok:
    humor: high
    directness: high
    uncensored: true

llm:
  ollama_url: "http://127.0.0.1:11434"
  model: "llama3.2:latest"
  num_ctx: 4096
  temperature: 0.8
  timeout_seconds: 120

profiles:
  rtx_4060:
    model: "llama3.2:latest"
    num_ctx: 4096
  rtx_4090:
    model: "llama3.1:8b"
    num_ctx: 8192

modules:
  chat:
    enabled: true
  roleplay:
    enabled: true
    max_history: 40
    memory_summary_interval: 20
  image:
    enabled: true
    comfyui_url: "http://127.0.0.1:8188"
    checkpoint: "auto"
    # Multi-backend routing: GET /api/generate/backends · POST /api/generate/image { backend, vae }
    # backends: sd15 | sdxl | flux | pony — resolution policy FHD (1920×1080) to 8K (7680×4320)
    lora_strength: 0.8
    output_dir: "./data/outputs/images"
    quality:
      enabled: true
      mode: light
      device: cpu
      max_retries: 5
      min_clip_score: 0.18
      min_aesthetic: 4.5
      save_bad: true
      save_good: true
      escalate_after: 3
      fallback_checkpoint: auto
      allow_high_saturation: false
      allow_dark_style: false
      add_quality_tags: true
      auto_lora_on_retry: true
      data_dir: "./data/quality"
  video:
    enabled: true
    comfyui_url: "http://127.0.0.1:8188"
    training_materials_dir: "C:/MonsterAI/Training generative video"
    mode: "animatediff"
    max_frames: 16
    fps: 8
    width: 512
    height: 512
    steps: 15
    output_format: mp4
    require_ffmpeg: true
    temp_dir: "./data/tmp"
  tts:
    enabled: true
    engine: "piper"
    piper_voice: "zh_CN-huayan-medium"
    xtts_enabled: false
  mini:
    enabled: true
    data_dir: ./data/mini
    output_dir: ./data/outputs/mini
    default_template: stable
    default_locale: zh-TW
    checkpoint: auto
    lite_mode: true
    uncensored: true
    auto_optimize_prompt: true
    max_quality_retries: 6
    reject_bad_output: true
    min_quality_score: 0.70
    min_high_quality_score: 0.85
    auto_emergency_retry: true
    share_with_monster_ai: true
    network_learning_enabled: false
    network_allow_downloads: false
    network_allow_metrics_upload: false
    gguf_model_hint: qwen2.5:7b
    vram_profile: mini
    likeness_enabled: true
    likeness_target_similarity: 0.98
    likeness_ipadapter_weight: 0.85
    require_user_reference: true
    voice_clone_enabled: true
    multimodal_sync_enabled: true
    comfy_input_dir: ./data/comfyui/input
  prompt:
    enabled: true
  discord:
    enabled: false
    token_env: "MONSTER_DISCORD_TOKEN"
    application_id_env: "MONSTER_DISCORD_APP_ID"
    guard:
      enabled: true
      mode: embedded
      protection_level: standard
      action_mode: delete_warn
      ai_backend: auto
      monster_ai_url: ""
      chat_bridge_enabled: true
      chat_rate_limit_per_minute: 10
      data_dir: "./data/guard"
      self_heal_enabled: true
      self_heal_interval_seconds: 60
      self_heal_max_backoff_seconds: 300
  training:
    enabled: false

protection:
  rate_limit_per_minute: 60
  allowed_data_roots:
    - "./data"
  monsterlock:
    enabled: true
    strength: strict
    hardened_mode: true
    hardware_binding: true
    bind_gpu: true
    auto_bind_on_first_run: true
    block_on_mismatch: true
    integrity_check_enabled: true
    digital_signatures_enabled: true
    check_interval_seconds: 30
    auto_repair: true
    block_on_tamper: true
    anti_debug_enabled: true
    anti_debug_block_threshold: 60
    block_on_analysis: true
    behavior_monitor_enabled: true
    credential_rotation_enabled: true
    credential_rotation_seconds: 0.1
    config_guard_enabled: true
    self_destruct_enabled: true
    self_destruct_on_tamper: true
    self_destruct_on_analysis: true
    corrupt_assets_on_destruct: true
    force_exit_on_destruct: false
    data_dir: "./data/monsterlock"
    rule_sync_url: ""
    encrypt_assets_on_setup: false
  crimeguard:
    enabled: true
    locale: zh-HK
    llm_analysis_enabled: true
    vpn_detection_enabled: true
    device_contact_detection_enabled: true
    device_contact_scan_interval_seconds: 10
    device_contact_lock_on_high_risk: true
    device_contact_lock_min_score: 70
    escalate_usb_bluetooth_lock: false
    network_lock_enabled: true
    lock_mode: localhost_only
    auto_lock_on_crime: true
    vpn_lock_on_high_risk: true
    recovery_token: "MONSTER-RECOVER-2026"
    data_dir: "./data/crimeguard"
    rules_sync_url: ""
  firewall:
    enabled: true
    mode: learning
    learn_threshold: 50
    block_threshold: 80
    learn_escalate_count: 5
    learn_escalate_window_minutes: 10
    ban_duration_minutes: 60
    whitelist_ips:
      - "127.0.0.1"
      - "::1"
  notifications:
    webui: true
    discord: false
    discord_webhook: ""
    email:
      enabled: false

dify:
  enabled: false
  api_url: ""
  api_key_env: DIFY_API_KEY
  workflow_image_id: ""
  workflow_multimodal_id: ""
  min_quality_score: 0.70
  fallback_to_monster: true

integrations:
  make_webhook_secret_env: MAKE_WEBHOOK_SECRET
  sentry_dsn_env: SENTRY_DSN
  sentry_enabled: false
  jam_enabled: false
  ahrefs_enabled: false

commercial:
  enabled: true
  data_dir: ./data/commercial
  trial_days: 7
  unlock_dev_token: ""
  min_high_quality_score: 0.85

guardian:
  enabled: true
  data_dir: "./data/guardian"
  tunnel_url_env: GUARDIAN_TUNNEL_URL
  tunnel_url_file: ./data/guardian-ai/tunnel_url.txt
  github_releases_page: "https://github.com/SB00001090/Guardian-Ai/releases/latest"
  cloud_sync_enabled: true
  cloud_sync_backend: dual  # local | google_drive | dual
  google_drive_folder_name: "Guardian Ai Sync"
  e2e_encryption_required: true
  ephemeral_chat_default: true
  oc_fingerprint_enabled: true
  oc_watermark_enabled: true
  grok_supervision_enabled: true
  min_quality_score: 0.70
  oauth_providers:
    - google
    - github
    - discord
  apk_usb_install_enabled: true
  training_encryption_enabled: true
  bind_hardware_key: true
  require_user_passphrase: false
  encrypt_quality_assets: true
  delete_plaintext_after_encrypt: true
  network_learning:
    enabled: false
    require_grok_approval: true
    schedule_windows:
      - "02:00-05:00"
    max_topics_per_run: 3
    allow_anonymous_metrics: false
    art_triage_enabled: true