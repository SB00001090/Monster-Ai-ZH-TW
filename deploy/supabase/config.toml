# Guardian Ai — Supabase CLI config (GitHub Integration working dir: deploy)
# https://supabase.com/docs/guides/deployment/branching/github-integration

project_id = "guardian-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://127.0.0.1:7860/login",
  "https://monster-ai.pages.dev",
  "https://monster-ai.pages.dev/**",
]

[auth.external.github]
enabled = true